<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phontex</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
    }

    .container {
      text-align: center;
    }

    .logo {
      font-size: 48px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      letter-spacing: -1px;
    }

    .sub {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      font-family: 'Consolas', 'Monaco', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Phontex</div>
    <div class="sub">Ctrl+Shift+I to capture</div>
  </div>
</body>
</html>
