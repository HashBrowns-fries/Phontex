name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: lint + smoke test ─────────────────────────────────────────────
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install deps
        run: uv sync --all-extras --group frontend

      - name: Lint
        run: uv run ruff check .

      - name: Smoke test
        run: uv run python scripts/smoke_test.py

  # ── Tauri build (Linux x86_64) ────────────────────────────────────────────
  build-tauri:
    needs: python
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libssl-dev libdbus-1-dev librsvg2-dev \
            patchelf binutils liblzma-dev libstdc++-12-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/tauri/package-lock.json

      - name: Install frontend deps
        run: cd frontend/tauri && npm ci

      - name: Build Tauri app
        run: cd frontend/tauri && npm run tauri build
        env:
          CARGO_HOME: ${{ github.workspace }}/.cargo
          RUSTUP_HOME: ${{ github.workspace }}/.rustup

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phontex-linux-x64
          path: frontend/tauri/target/release/bundle/linux-x86_64/
          retention-days: 14